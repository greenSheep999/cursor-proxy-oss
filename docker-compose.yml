# Minimal docker-compose for cursor-proxy.
#
# Setup:
#   1. Drop a Cursor auth JSON at ./auth/current.json (see
#      docs/deployment/auth-file.md).
#   2. Copy .env.example to .env and set CURSOR_PROXY_API_KEYS.
#   3. `docker compose up -d`.
#
# The image is built off multi-arch (linux/amd64 + linux/arm64) so it runs
# unchanged on Intel and Apple silicon hosts, x86 servers, and Raspberry Pi.

services:
  cursor-proxy:
    # Pinned to a specific upstream release. The sync-from-upstream
    # workflow bumps this line automatically when cursor-proto ships
    # a new cursor<X.Y>/v<x.y.z> tag. Don't hand-edit unless you know
    # exactly which version you want.
    image: ghcr.io/greensheep999/cursor-proxy:cursor3.11-v0.2.3
    container_name: cursor-proxy
    restart: unless-stopped
    pull_policy: always
    ports:
      # Localhost-only by default. Change to "8317:8317" only behind a
      # trusted network (LAN, tailscale, ...).
      - "127.0.0.1:8317:8317"
    environment:
      # Comma-separated allowlist. Clients must present one of these keys.
      # Never expose the proxy without setting this.
      CURSOR_PROXY_API_KEYS: "${CURSOR_PROXY_API_KEYS:?set CURSOR_PROXY_API_KEYS in .env}"
      # Path (inside the container) to the Cursor auth JSON.
      CURSOR_PROXY_ACCOUNT_FILE: "/data/accounts/current.json"
      # Optional outbound proxy for the Anthropic / OpenAI / Gemini
      # model families. Cursor geo-gates those upstreams by IP; from
      # a CN/HK egress every claude-*/gpt-*/gemini-* request returns
      # 403 "Model not available in your region". Point at a US/EU
      # http:// or socks5:// endpoint to unlock them. Cursor-native
      # models (composer-*, grok-*, kimi-*, glm-*) work without this.
      # See docs/deployment/proxy.md.
      HTTPS_PROXY: "${HTTPS_PROXY:-}"
      HTTP_PROXY: "${HTTP_PROXY:-}"
      NO_PROXY: "${NO_PROXY:-localhost,127.0.0.1}"
    volumes:
      # Read-only mount of the account file. Populate the host ./auth/
      # directory with one or more cursor-<email>.json files and point
      # CURSOR_PROXY_ACCOUNT_FILE at the one you want to use.
      - ./auth:/data/accounts:ro
