name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: build & test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: gofmt
        run: |
          diff="$(gofmt -l .)"
          if [ -n "$diff" ]; then
            echo "::error::gofmt reported diffs:"
            echo "$diff"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -race -count=1 ./...

      - name: build cpctl binaries
        run: |
          mkdir -p dist
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              ext=""
              [[ "$os" == "windows" ]] && ext=".exe"
              GOOS=$os GOARCH=$arch go build -trimpath -ldflags="-s -w" \
                -o "dist/cpctl-${os}-${arch}${ext}" ./cmd/cpctl
            done
          done
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: cpctl-binaries
          path: dist/*
          retention-days: 14
